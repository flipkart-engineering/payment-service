name: Payment Service CI

on:
  push:
    branches:
      - develop
      - 'feature/**'

  pull_request:
    branches:
      - main

jobs:

  build:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Verify Java
        run: java -version

      - name: Verify Maven
        run: mvn -version

      - name: Compile Application
        run: mvn clean compile

      - name: Run Unit Tests
        run: mvn test

      - name: Package Application
        run: mvn package

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: payment-service-jar
          path: target/*.jar

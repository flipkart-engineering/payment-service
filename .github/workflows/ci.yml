name: Payment Service CI

on:
  push:
    branches:
      - develop
      - 'feature/**'

  pull_request:
    branches:
      - main

jobs:

  build:

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Compile
        run: mvn clean compile

  test:

    runs-on: ubuntu-latest

    needs: build

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Run Tests
        run: mvn test

  package:

    runs-on: ubuntu-latest

    needs: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Package
        run: mvn package

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: payment-service-jar
          path: target/*.jar

  docker:

    runs-on: ubuntu-latest

    needs: package

    steps:

      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: payment-service-jar
          path: target

      - name: Build Docker Image
        run: |
          docker build -t payment-service:${{ github.sha }} .

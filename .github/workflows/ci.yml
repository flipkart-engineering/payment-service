name: Payment Service CI

on:
  push:
    branches:
      - develop
      - 'feature/**'

  pull_request:
    branches:
      - main

jobs:

  build:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Compile
        run: mvn clean compile

  test:

    runs-on: ubuntu-latest

    needs: build

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Run Unit Tests
        run: mvn test

      - name: Upload JaCoCo Report
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco

  package:

    runs-on: ubuntu-latest

    needs: test

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Package Application
        run: mvn package

      - name: Upload Jar
        uses: actions/upload-artifact@v4
        with:
          name: payment-service-jar
          path: target/*.jar

  docker:

    runs-on: ubuntu-latest

    needs: package

    steps:

      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: payment-service-jar
          path: target

      - name: Build Docker Image
        run: 
          docker build -t payment-service:${{ github.sha }} .
